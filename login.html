<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body data-page="login">

    <section class="login-section">

        <div class="login-card">

            <h2>Welcome Back 👋</h2>

            <p>Login to continue your journey and keep your progress saved locally.</p>

            <form id="loginForm">

                <input id="usernameInput" type="text" placeholder="Username" required>

                <input type="password" placeholder="Password" required>

                <button class="hero-btn" type="submit">
                    Login
                </button>

            </form>

            <p class="login-hint">Use any username to start. Your data is stored in LocalStorage.</p>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
